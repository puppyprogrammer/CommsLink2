<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
    <linearGradient id="ship-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#569cd6"/>
      <stop offset="100%" stop-color="#9cdcfe"/>
    </linearGradient>
    <linearGradient id="flame-grad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b388ff"/>
      <stop offset="40%" stop-color="#7c4dff"/>
      <stop offset="100%" stop-color="#4a148c" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="flame-inner" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0b0ff"/>
      <stop offset="100%" stop-color="#b388ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Flames (behind ship, pointing down-left) -->
  <path d="M 72 128 Q 50 150 30 170 Q 55 155 65 138 Q 45 165 20 185 Q 55 160 72 128"
        fill="url(#flame-grad)" filter="url(#glow)" opacity="0.8"/>
  <path d="M 78 122 Q 60 140 45 158 Q 62 145 72 130 Q 58 152 38 172 Q 60 148 78 122"
        fill="url(#flame-inner)" filter="url(#glow)" opacity="0.7"/>

  <!-- Ship body - pointed up-right -->
  <path d="M 150 30 L 95 85 L 75 115 L 85 125 L 115 105 Z"
        fill="url(#ship-grad)" stroke="#9cdcfe" stroke-width="1" stroke-linejoin="round"/>

  <!-- Wing detail -->
  <path d="M 115 105 L 130 110 L 140 95 L 115 105" fill="#4080bf" opacity="0.7"/>
  <path d="M 75 115 L 70 100 L 85 90 L 75 115" fill="#4080bf" opacity="0.7"/>

  <!-- Cockpit window -->
  <path d="M 135 50 L 115 75 L 120 80 L 140 55 Z" fill="#0d1117" opacity="0.6" rx="2"/>

  <!-- Accent line -->
  <line x1="105" y1="82" x2="130" y2="57" stroke="#e0b0ff" stroke-width="1.5" opacity="0.5"/>
</svg>
