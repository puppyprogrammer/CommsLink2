services:
  mysql:
    image: mysql:8.0
    container_name: commslink2-mysql
    restart: unless-stopped
    env_file: .env.production
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: commslink
    volumes:
      - commslink_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: commslink2-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: commslink2-api
    restart: unless-stopped
    env_file: .env.production
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/commslink
      JWT_SECRET: ${JWT_SECRET}
      GROK_API_KEY: ${GROK_API_KEY}
      GROK_MODEL: ${GROK_MODEL:-grok-4-1-fast-non-reasoning}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      REDIS_URL: redis://redis:6379
      CLIENT_URL: https://commslink.net
      NODE_ENV: production
      PORT: 4000
      TERMINAL_AGENT_BIN_DIR: /app/terminal-agent-bin
      AGENT_VERSION: "1.6.4"
    volumes:
      - commslink_uploads:/app/uploads
      - ./packages/terminal-agent/bin:/app/terminal-agent-bin:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: ./services/web
      dockerfile: Dockerfile
    container_name: commslink2-web
    restart: unless-stopped
    env_file: .env.production
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      SESSION_SECRET: ${SESSION_SECRET}
      INTERNAL_API_URL: http://api:4000
      NODE_ENV: production
    depends_on:
      - api

volumes:
  commslink_mysql_data:
  commslink_uploads:
